version: "3.9"
services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data   # events.jsonl + pos_transactions.csv live here
    environment:
      - DB_PATH=/app/data/store_intelligence.db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # Optional: auto-ingest events on startup
  ingest:
    build: .
    depends_on: [api]
    volumes:
      - ./data:/app/data
    command: python scripts/ingest_events.py --events /app/data/events.jsonl